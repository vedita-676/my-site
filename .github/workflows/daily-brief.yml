name: Daily Brief

on:
  schedule:
    - cron: '30 1 * * *'   # 7:00 AM IST daily
  workflow_dispatch:         # manual trigger from GitHub Actions UI

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic composio-core

      - name: Generate brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
        run: python3 generate_brief.py
        timeout-minutes: 10

      - name: Commit and push if changed
        run: |
          git config user.name "SC Bot"
          git config user.email "bot@stepchange.earth"
          git add data.json
          git diff --staged --quiet || (git commit -m "Daily brief $(date -u +%Y-%m-%d)" && git push)
